<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Swimming Fish</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background-color: #87CEEB;
}

.fish {
    position: absolute;
    cursor: pointer;
    user-select: none;
}

.fish-name {
    position: absolute;
    font-size: 10px;
    color: black;
    font-family: Arial, sans-serif;
    pointer-events: none;
}

.hp-container {
    position: absolute;
    width: 60px;
    height: 3px;
    border: 1px solid black;
    border-radius: 3px;
    background: black;
    overflow: hidden;
}

.hp-back {
    position: absolute;
    height: 100%;
    width: 100%;
    background: #e74c3c;
}

.hp-fill {
    position: absolute;
    height: 100%;
    width: 100%;
    background: #2ecc71;
}
</style>
</head>

<body>

<script>
function createFish(x, y, size, hp, rs, modifiers = []) {

    const fish = document.createElement("img");
    fish.src = "images/baby_bluefin.png";
    fish.className = "fish";

    const hpBar = document.createElement("div");
    hpBar.className = "hp-container";

    const hpBack = document.createElement("div");
    hpBack.className = "hp-back";

    const hpFill = document.createElement("div");
    hpFill.className = "hp-fill";

    hpBar.appendChild(hpBack);
    hpBar.appendChild(hpFill);

    const nameTag = document.createElement("div");
    nameTag.className = "fish-name";

    const mh = hp;

    let displayHp = hp;
    let backHp = hp;

    const fromLeft = Math.random() < 0.5;

    fish.style.width = size + "px";

    fish.style.top = y + "px";
    fish.style.left = x + "px";
    fish.style.transform = fromLeft ? "scaleX(-1)" : "scaleX(1)";

    document.body.appendChild(fish);
    document.body.appendChild(hpBar);
    document.body.appendChild(nameTag);

    // 🏷️ NAME SORTING
    const sortedMods = [...modifiers].sort();
    const name = (sortedMods.length ? sortedMods.join(" ") + " " : "") + "Baby Bluefin";
    nameTag.innerText = name;

    let alive = true;

    fish.onclick = () => {
        if (!alive) return;

        hp -= 1;

        if (hp <= 0) {
            alive = false;

            // ✂️ SPLITTER LOGIC
            if (modifiers.includes("giant") && modifiers.includes("splitter")) {

                for (let i = 0; i < 2; i++) {
                    const newMods = modifiers.filter(m => m !== "giant" && m !== "splitter");

                    createFish(
                        x + Math.random() * 30,
                        y + Math.random() * 30,
                        size / 2,
                        Math.max(1, Math.floor(mh * 0.2)),
                        rs * 1.5,
                        newMods
                    );
                }
            }

            fish.remove();
            hpBar.remove();
            nameTag.remove();
        }
    };

    function move() {
        if (!document.body.contains(fish)) return;

        const s = rs * (hp / mh) + (0.15 * rs);

        if (fromLeft) {
            x += s;
            if (x > window.innerWidth) {
                fish.remove();
                hpBar.remove();
                nameTag.remove();
                return;
            }
        } else {
            x -= s;
            if (x < -size) {
                fish.remove();
                hpBar.remove();
                nameTag.remove();
                return;
            }
        }

        fish.style.left = x + "px";

        displayHp += (hp - displayHp) * 0.375;
        backHp += (hp - backHp) * 0.125;

        hpFill.style.width = (displayHp / mh) * 100 + "%";
        hpBack.style.width = (backHp / mh) * 100 + "%";

        hpBar.style.left = (x + size * 0.2) + "px";
        hpBar.style.top = (y + size + 18) + "px";

        nameTag.style.left = (x + size * 0.2) + "px";
        nameTag.style.top = (y + size - 10) + "px";

        requestAnimationFrame(move);
    }

    move();
}

function spawnFish() {

    let size = 80;
    let rs = 2;
    let mh = 5;
    let modifiers = [];

    // 🧬 GIANT (1 in 5)
    if (Math.floor(Math.random() * 5) === 0) {
        modifiers.push("Giant");
        size *= 2;
        rs *= 0.5;
        mh *= 5;

        // ✂️ SPLITTER (1 in 5 giant fish)
        if (Math.floor(Math.random() * 5) === 0) {
            modifiers.push("Splitter");
        }
    }

    const fromLeft = Math.random() < 0.5;

    const x = fromLeft ? -size : window.innerWidth;
    const y = Math.random() * (window.innerHeight - size);

    createFish(x, y, size, mh, rs, modifiers);
}

setInterval(spawnFish, 5000);
</script>

</body>
</html>
