<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Swimming Fish</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background-color: #87CEEB;
    }

    .fish {
        position: absolute;
        width: 80px;
        cursor: pointer;
        user-select: none;
    }

    /* HP frame */
    .hp-container {
        position: absolute;
        width: 60px;
        height: 4px;
        border: 1px solid black;
        border-radius: 6px;
        background: black;
        overflow: hidden;
    }

    /* red delayed damage bar */
    .hp-back {
        position: absolute;
        height: 100%;
        width: 100%;
        background: #e74c3c;
        border-radius: 6px;
        transition: width 0.25s ease;
    }

    /* real HP (green) */
    .hp-fill {
        position: absolute;
        height: 100%;
        width: 100%;
        background: #2ecc71;
        border-radius: 6px;
        transition: width 0.08s linear;
    }
</style>
</head>

<body>

<script>
function spawnFish() {
    const fish = document.createElement("img");
    fish.src = "images/baby_bluefin.png";
    fish.className = "fish";

    const hpBar = document.createElement("div");
    hpBar.className = "hp-container";

    const hpBack = document.createElement("div");
    hpBack.className = "hp-back";

    const hpFill = document.createElement("div");
    hpFill.className = "hp-fill";

    hpBar.appendChild(hpBack);
    hpBar.appendChild(hpFill);

    let hp = 5;
    const mh = 5;
    const rs = 2;

    let displayHp = hp; // smooth green
    let backHp = hp;    // red lag bar

    const fromLeft = Math.random() < 0.5;

    let y = Math.random() * (window.innerHeight - 80);
    let x = fromLeft ? -80 : window.innerWidth;

    fish.style.top = y + "px";
    fish.style.left = x + "px";

    fish.style.transform = fromLeft ? "scaleX(-1)" : "scaleX(1)";

    document.body.appendChild(fish);
    document.body.appendChild(hpBar);

    fish.onclick = () => {
        hp -= 1;
        if (hp <= 0) {
            fish.remove();
            hpBar.remove();
        }
    };

    function move() {
        if (!document.body.contains(fish)) return;

        // speed formula
        const s = rs * (hp / mh) + (0.15 * rs);

        if (fromLeft) {
            x += s;
            if (x > window.innerWidth) {
                fish.remove();
                hpBar.remove();
                return;
            }
        } else {
            x -= s;
            if (x < -80) {
                fish.remove();
                hpBar.remove();
                return;
            }
        }

        fish.style.left = x + "px";

        // smooth HP animation
        displayHp += (hp - displayHp) * 0.15; // green follows fast
        backHp += (hp - backHp) * 0.05;       // red lags slower

        const greenW = (displayHp / mh) * 100;
        const redW = (backHp / mh) * 100;

        hpFill.style.width = greenW + "%";
        hpBack.style.width = redW + "%";

        hpBar.style.left = (x + 10) + "px";
        hpBar.style.top = (y + 85) + "px";

        requestAnimationFrame(move);
    }

    move();
}

// spawn 1 fish every 5 seconds
setInterval(spawnFish, 5000);
</script>

</body>
</html>
